name: Build Stable APK
on:
  push:
    branches:
      - 7-refactor-add-link-and-cleanup-clipboard
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Force Debug Signing on Release
        run: |
          # Validate expected structure exists
          if ! grep -q 'signingConfigs {' app/build.gradle.kts; then
            echo "ERROR: signingConfigs block not found"
            exit 1
          fi
          if ! grep -q 'release {' app/build.gradle.kts; then
            echo "ERROR: release build type not found"
            exit 1
          fi

          # Extract signingConfigs block
          sed -n '/signingConfigs {/,/    }/p' app/build.gradle.kts > signing_block.txt
          
          if [ ! -s signing_block.txt ]; then
            echo "ERROR: Failed to extract signingConfigs block"
            exit 1
          fi

          # Remove original signingConfigs block
          awk '/signingConfigs \{/{skip=1} skip{if(/    \}/) skip=0; next} 1' app/build.gradle.kts > tmp.kts && mv tmp.kts app/build.gradle.kts
          
          # Insert signingConfigs block before buildTypes
          awk '/buildTypes \{/ { system("cat signing_block.txt") } 1' app/build.gradle.kts > tmp.kts && mv tmp.kts app/build.gradle.kts
          
          # Link release build to debug signing
          awk '/release \{/ { print; print "            signingConfig = signingConfigs.getByName(\"debug\")"; next } 1' app/build.gradle.kts > tmp.kts && mv tmp.kts app/build.gradle.kts

          # Verify the change was applied
          if ! grep -q 'signingConfig = signingConfigs.getByName("debug")' app/build.gradle.kts; then
            echo "ERROR: Failed to inject debug signing config"
            exit 1
          fi

      - name: Build Github Release APK
        run: ./gradlew assembleGithubRelease

      - name: 🚀 Upload APK to Artifacts 📱
        uses: actions/upload-artifact@v4
        with:
          name: app-github-release
          path: app/build/outputs/apk/github/release/*.apk
          retention-days: 3

      - name: Create Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ github.token }}"
          automatic_release_tag: "latest-stable"
          prerelease: true
          title: "Latest Stable Build (${{ github.ref_name }})"
          files: app/build/outputs/apk/github/release/*.apk
