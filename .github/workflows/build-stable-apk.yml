name: Build Stable APK
on:
  push:
    branches:
      - 4-feature-profiles-ui-components
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Force Debug Signing on Release
        run: |
          # Validate expected structure exists
          if ! grep -q 'signingConfigs {' app/build.gradle.kts; then
            echo "ERROR: signingConfigs block not found"
            exit 1
          fi
          if ! grep -q 'release {' app/build.gradle.kts; then
            echo "ERROR: release build type not found"
            - name: Inject debug signing into release build
              run: |
                # Extract signingConfigs block using awk for proper brace matching
                awk '/signingConfigs \{/{p=1; depth=0} p{print; depth+=gsub(/\{/,"{"); depth-=gsub(/\}/,"}"); if(depth==0 && p) exit}' app/build.gradle.kts > signing_block.txt

                if [ ! -s signing_block.txt ]; then
                  echo "ERROR: Failed to extract signingConfigs block"
                  exit 1
                fi

                # Remove original signingConfigs block using awk
                awk 'BEGIN{p=1} /signingConfigs \{/{skip=1; depth=0} skip{depth+=gsub(/\{/,"{"); depth-=gsub(/\}/,"}"); if(depth==0) skip=0; next} p' app/build.gradle.kts > temp.gradle.kts && mv temp.gradle.kts app/build.gradle.kts

                # Insert signingConfigs block before buildTypes
                sed -i '/buildTypes {/i \\' app/build.gradle.kts
                sed -i '/buildTypes {/e cat signing_block.txt' app/build.gradle.kts

                # Link release build to debug signing if not already present
                if grep -A10 'release {' app/build.gradle.kts | grep -q 'signingConfig'; then
                  sed -i '/release {/,/}/ s/signingConfig = .*/signingConfig = signingConfigs.getByName("debug")/' app/build.gradle.kts
                else
                  sed -i '/release {/a \            signingConfig = signingConfigs.getByName("debug")' app/build.gradle.kts
                fi

                # Verify the change was applied
                if ! grep -q 'signingConfig = signingConfigs.getByName("debug")' app/build.gradle.kts; then
                  echo "ERROR: Failed to inject debug signing config"
                  exit 1
                fi
          fi

      - name: Build Github Release APK
        run: ./gradlew assembleGithubRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "latest-stable"
          name: "Latest Stable Build"
          body: "Automatic build of the stable APK from ${{ github.ref_name }} branch."
          draft: false
          prerelease: true
          files: app/build/outputs/apk/github/release/*.apk
        env:
          GITHUB_TOKEN: ${{ github.token }}
