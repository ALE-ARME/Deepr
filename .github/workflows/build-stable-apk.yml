name: Build Stable APK
on:
  push:
    branches:
      - 4-feature-profiles-ui-components
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Github Release APK
        run: ./gradlew assembleGithubRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "latest-stable"
          name: "Latest Stable Build"
          body: "Automatic build of the stable APK from ${{ github.ref_name }} branch."
          draft: false
          prerelease: true
          files: app/build/outputs/apk/github/release/*.apk
        env:
          GITHUB_TOKEN: ${{ github.token }}
