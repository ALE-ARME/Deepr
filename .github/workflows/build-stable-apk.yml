name: Build Stable APK
on:
  push:
    branches:
      - 4-feature-profiles-ui-components
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Force Debug Signing on Release
        run: |
          python3 - <<EOF
          import os

          path = "app/build.gradle.kts"
          with open(path, "r") as f:
              lines = f.readlines()

          # Find signingConfigs block
          start_idx = -1
          end_idx = -1
          depth = 0
          for i, line in enumerate(lines):
              if "signingConfigs {" in line:
                  start_idx = i
                  depth = line.count("{") - line.count("}")
                  if depth == 0:
                      end_idx = i
                      break
                  continue
              if start_idx != -1:
                  depth += line.count("{") - line.count("}")
                  if depth == 0:
                      end_idx = i
                      break

          if start_idx == -1 or end_idx == -1:
              print("ERROR: signingConfigs block not found")
              exit(1)

          signing_block = lines[start_idx : end_idx + 1]
          
          # Remove signingConfigs block
          new_lines = lines[:start_idx] + lines[end_idx + 1:]

          # Find buildTypes block
          bt_idx = -1
          for i, line in enumerate(new_lines):
              if "buildTypes {" in line:
                  bt_idx = i
                  break
          
          if bt_idx == -1:
              print("ERROR: buildTypes block not found")
              exit(1)

          # Inject signingConfigs before buildTypes
          final_lines = new_lines[:bt_idx] + ["\n"] + signing_block + new_lines[bt_idx:]

          # Link release to debug signing
          # 1. Find release block within buildTypes
          rel_start = -1
          rel_end = -1
          in_bt = False
          depth = 0
          for i, line in enumerate(final_lines):
              if "buildTypes {" in line:
                  in_bt = True
                  depth = 0
              if in_bt:
                  depth += line.count("{") - line.count("}")
                  if "release {" in line:
                      rel_start = i
                  if depth == 0 and i > final_lines.index([l for l in final_lines if "buildTypes {" in l][0]):
                      in_bt = False
                      break
          
          # Simplified search for release block
          for i, line in enumerate(final_lines):
              if "release {" in line:
                  rel_start = i
                  break
          
          if rel_start != -1:
              # Check if signingConfig already exists in the next few lines
              found_sc = False
              for j in range(rel_start + 1, rel_start + 10):
                  if j < len(final_lines) and "signingConfig =" in final_lines[j]:
                      final_lines[j] = '            signingConfig = signingConfigs.getByName("debug")\n'
                      found_sc = True
                      break
              if not found_sc:
                  final_lines.insert(rel_start + 1, '            signingConfig = signingConfigs.getByName("debug")\n')

          with open(path, "w") as f:
              f.writelines(final_lines)
          EOF

          # Verify the change was applied
          if ! grep -q 'signingConfig = signingConfigs.getByName("debug")' app/build.gradle.kts; then
            echo "ERROR: Failed to inject debug signing config"
            exit 1
          fi

      - name: Build Github Release APK
        run: ./gradlew assembleGithubRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "latest-stable"
          name: "Latest Stable Build"
          body: "Automatic build of the stable APK from ${{ github.ref_name }} branch."
          draft: false
          prerelease: true
          files: app/build/outputs/apk/github/release/*.apk
        env:
          GITHUB_TOKEN: ${{ github.token }}
