name: Build Stable APK
on:
  push:
    branches:
      - 4-feature-profiles-ui-components
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: set up JDK 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Force Debug Signing on Release
        run: |
          python3 - <<EOF
          import sys

          path = "app/build.gradle.kts"
          with open(path, "r") as f:
              lines = f.readlines()

          # 1. Extract signingConfigs block
          start_idx = -1
          end_idx = -1
          depth = 0
          for i, line in enumerate(lines):
              if "signingConfigs {" in line:
                  start_idx = i
                  depth = line.count("{") - line.count("}")
                  if depth == 0:
                      end_idx = i
                      break
                  continue
              if start_idx != -1:
                  depth += line.count("{") - line.count("}")
                  if depth == 0:
                      end_idx = i
                      break

          if start_idx == -1 or end_idx == -1:
              print("ERROR: signingConfigs block not found")
              sys.exit(1)

          signing_block = lines[start_idx : end_idx + 1]
          if not signing_block[-1].endswith("\n"):
              signing_block[-1] += "\n"
          signing_block.append("\n")

          # 2. Remove signingConfigs block from original position
          lines = lines[:start_idx] + lines[end_idx + 1:]

          # 3. Find buildTypes block
          bt_idx = -1
          for i, line in enumerate(lines):
              if "buildTypes {" in line:
                  bt_idx = i
                  break

          if bt_idx == -1:
              print("ERROR: buildTypes block not found")
              sys.exit(1)

          # 4. Inject signingConfigs before buildTypes
          lines = lines[:bt_idx] + signing_block + lines[bt_idx:]

          # 5. Inject signingConfig reference into release block
          content = "".join(lines)
          if "release {" in content:
              if 'signingConfig = signingConfigs.getByName("debug")' not in content:
                  content = content.replace("release {", 'release {\n            signingConfig = signingConfigs.getByName("debug")')
          else:
              print("ERROR: release block not found")
              sys.exit(1)

          with open(path, "w") as f:
              f.write(content)
          EOF

          # Verify the change was applied
          if ! grep -q 'signingConfig = signingConfigs.getByName("debug")' app/build.gradle.kts; then
            echo "ERROR: Failed to inject debug signing config"
            exit 1
          fi

      - name: Build Github Release APK
        run: ./gradlew assembleGithubRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: "latest-stable"
          name: "Latest Stable Build"
          body: "Automatic build of the stable APK from ${{ github.ref_name }} branch."
          draft: false
          prerelease: true
          files: app/build/outputs/apk/github/release/*.apk
        env:
          GITHUB_TOKEN: ${{ github.token }}
